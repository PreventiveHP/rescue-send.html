 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MontCode™ Rescue Send</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-black text-white flex flex-col items-center justify-center min-h-screen p-6 font-sans relative">

    <div id="setup-screen" class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center p-6 text-center">
        <div class="w-20 h-20 mb-6 bg-zinc-900 rounded-full flex items-center justify-center border-2 border-zinc-800 overflow-hidden">
            <img src="logo.png.jpg" alt="Logo" class="w-full h-full object-cover">
        </div>
        <h2 class="text-[#ccff00] font-black italic text-xl mb-2 tracking-tighter">CONFIGURACIÓN TÁCTICA</h2>
        <p class="text-zinc-500 text-[10px] mb-8 tracking-[0.3em] uppercase">Escanee para vincular monitor</p>
        
        <div id="qrcode-container" class="bg-white p-4 rounded-2xl mb-8 shadow-[0_0_30px_rgba(255,255,255,0.1)]"></div>
        
        <div class="mb-10">
            <p class="text-zinc-600 text-[10px] uppercase font-bold mb-1">Device ID:</p>
            <p id="display-id" class="text-[#ccff00] font-mono text-xl font-bold tracking-widest bg-zinc-900 px-6 py-2 rounded-lg border border-zinc-800 italic">--</p>
        </div>
        
        <button onclick="closeSetup()" class="bg-[#ccff00] text-black px-12 py-4 rounded-full font-black text-sm uppercase tracking-tighter active:scale-95 transition-all shadow-lg shadow-[#ccff00]/20">
            ENTRAR AL SISTEMA
        </button>
    </div>

    <div class="absolute top-6 right-6 flex gap-4 bg-zinc-900/50 p-2 rounded-full border border-zinc-800 z-10">
        <button onclick="setLanguage('en')" id="btn-en" class="text-2xl grayscale-0 scale-110 transition-all focus:outline-none">🇺🇸</button>
        <button onclick="setLanguage('es')" id="btn-es" class="text-2xl grayscale opacity-50 hover:opacity-100 transition-all focus:outline-none">🇪🇸</button>
    </div>

    <div class="text-center mb-10 mt-16 flex flex-col items-center">
        <div class="w-24 h-24 mb-6 bg-zinc-900 rounded-full flex items-center justify-center border-4 border-[#ccff00]/20 shadow-lg shadow-[#ccff00]/10 overflow-hidden">
            <img src="logo.png.jpg" alt="MontCode Rescue Logo" class="w-full h-full object-cover">
        </div>
        <h1 id="title" class="text-[#ccff00] text-3xl font-black italic tracking-tighter uppercase">RESCUE SEND</h1>
        <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.3em]">Tactical Transmitter v5.8</p>
        <p id="small-id-display" class="text-zinc-700 text-[9px] font-mono mt-2"></p>
    </div>

    <button onclick="triggerRescue()" class="w-64 h-64 bg-red-600 hover:bg-red-700 text-white font-black rounded-full border-[10px] border-red-900/30 shadow-[0_0_50px_rgba(220,38,38,0.4)] active:scale-90 transition-all flex flex-col items-center justify-center group relative overflow-hidden focus:outline-none">
        <span id="tap-text" class="text-5xl italic uppercase">TAP</span>
        <span id="sub-text" class="text-[10px] opacity-70 mt-2 uppercase tracking-[0.2em]">To Call Help</span>
    </button>

    <div id="status-box" class="mt-12 p-4 rounded-2xl bg-zinc-900 border border-zinc-800 w-full max-w-xs text-center">
        <p id="status-text" class="text-zinc-500 font-bold text-[10px] uppercase tracking-widest">System Ready / Sistema Listo</p>
    </div>

    <script>
        let currentLang = 'en';

        // --- LÓGICA DE IDENTIDAD ÚNICA ---
        const patientID = localStorage.getItem('montcode_device_id') || 
                         'MC-' + Math.random().toString(36).substr(2, 6).toUpperCase();
        
        localStorage.setItem('montcode_device_id', patientID);
        document.getElementById('display-id').innerText = patientID;
        document.getElementById('small-id-display').innerText = "ID: " + patientID;

        // Generar QR al cargar
        window.onload = () => {
            new QRCode(document.getElementById("qrcode-container"), {
                text: patientID,
                width: 180,
                height: 180,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        };

        function closeSetup() {
            document.getElementById('setup-screen').classList.add('opacity-0');
            setTimeout(() => {
                document.getElementById('setup-screen').classList.add('hidden');
            }, 300);
        }

        // --- LÓGICA DE IDIOMA Y ENVÍO ---
        const translations = {
            en: {
                title: "RESCUE SEND",
                tap: "TAP",
                sub: "To Call Help",
                transmitting: "TRANSMITTING...",
                sent: "SIGNAL DELIVERED ✅",
                msg: "I NEED HELP - CALL 911 IMMEDIATELY",
                offline: "CONNECTION FAILED"
            },
            es: {
                title: "ENVÍO RESCATE",
                tap: "TOCAR",
                sub: "Pedir Ayuda",
                transmitting: "TRANSMITIENDO...",
                sent: "SEÑAL ENTREGADA ✅",
                msg: "NECESITO AYUDA - LLAME AL 911 DE INMEDIATO",
                offline: "SIN CONEXIÓN"
            }
        };

        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('title').innerText = translations[lang].title;
            document.getElementById('tap-text').innerText = translations[lang].tap;
            document.getElementById('sub-text').innerText = translations[lang].sub;
            
            const btnEn = document.getElementById('btn-en');
            const btnEs = document.getElementById('btn-es');
            
            if (lang === 'en') {
                btnEn.classList.remove('grayscale', 'opacity-50');
                btnEn.classList.add('scale-110');
                btnEs.classList.add('grayscale', 'opacity-50');
                btnEs.classList.remove('scale-110');
            } else {
                btnEs.classList.remove('grayscale', 'opacity-50');
                btnEs.classList.add('scale-110');
                btnEn.classList.add('grayscale', 'opacity-50');
                btnEn.classList.remove('scale-110');
            }
        }

        async function triggerRescue() {
            const status = document.getElementById('status-text');
            const patientName = "MANUEL MONTALVAN";

            status.innerText = translations[currentLang].transmitting;
            status.className = "text-yellow-500 font-bold text-[10px] animate-pulse uppercase tracking-widest";

            try {
                // Notar que ahora enviamos 'channel_id' para que la API sepa a quién avisar
                const response = await fetch('/api/pusher-relay', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        sys: 911,
                        channel_id: patientID, // <--- ID ÚNICO
                        patient: patientName, 
                        provider: translations[currentLang].msg 
                    })
                });

                if(response.ok) {
                    status.innerText = translations[currentLang].sent;
                    status.className = "text-[#ccff00] font-bold text-[10px] uppercase tracking-widest";
                    if(navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 100, 300]);
                } else {
                    status.innerText = "API ERROR: " + response.status;
                    status.className = "text-red-500 font-bold text-[10px] uppercase tracking-widest";
                }
            } catch (e) {
                status.innerText = translations[currentLang].offline;
                status.className = "text-red-600 font-bold text-[10px] uppercase tracking-widest";
            }
        }
    </script>
</body>
</html>
